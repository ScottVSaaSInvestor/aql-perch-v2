<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQL Growth · PERCH · IC Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   AQL GROWTH — PERCH IC REPORT · v3 DARK EDITION
   Narrative flow. Transparent branding. Watermark eagle.
   Path-to-SOA spectrum visualization.
   ============================================================ */

:root {
  --navy: #0a1424;
  --navy-mid: #0f1b2d;
  --navy-card: #17263d;
  --navy-light: #1e3050;
  --navy-deeper: #050b17;
  --gold: #c9a961;
  --gold-bright: #e6c580;
  --gold-dim: rgba(201, 169, 97, 0.5);
  --teal: #0d9488;
  --teal-bright: #2dd4bf;
  --teal-dim: rgba(45, 212, 191, 0.45);
  --green: #4ade80;
  --amber: #f0b73d;
  --red: #ef4444;
  --ink: rgba(255, 255, 255, 0.94);
  --ink-soft: rgba(255, 255, 255, 0.78);
  --ink-muted: rgba(255, 255, 255, 0.55);
  --ink-faint: rgba(255, 255, 255, 0.35);
  --rule: rgba(255, 255, 255, 0.1);
  --rule-soft: rgba(255, 255, 255, 0.06);
  --rule-gold: rgba(201, 169, 97, 0.3);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: #1a1a1a;
  color: var(--ink);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 10.5pt;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============================================================
   PAGE CONTAINER — dark navy, watermark-ready
   ============================================================ */

.page {
  width: 8.5in;
  height: 11in;
  padding: 0.7in 0.75in 1.2in;
  margin: 28px auto;
  background: var(--navy);
  background-image:
    radial-gradient(ellipse at top right, rgba(13, 148, 136, 0.06), transparent 60%),
    radial-gradient(ellipse at bottom left, rgba(201, 169, 97, 0.04), transparent 60%);
  box-shadow: 0 12px 48px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
  color: var(--ink);
  page-break-after: always;
  break-after: page;
}
.page:last-child { page-break-after: auto; }

/* Eagle watermark — very subtle, behind everything */
.page.content::after {
  content: '';
  position: absolute;
  top: 50%;
  right: -4in;
  width: 10in;
  height: 10in;
  background-image: var(--eagle-watermark-url);
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  transform: translateY(-50%);
  opacity: 0.035;
  pointer-events: none;
  z-index: 0;
}

/* Thin top accent bar */
.page.content::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(to right, var(--gold-bright) 0%, var(--teal-bright) 50%, var(--gold-bright) 100%);
  opacity: 0.85;
  z-index: 2;
}

.page.content > * {
  position: relative;
  z-index: 1;
}

/* Content fills the page but doesn't overflow */
.page-body {
  position: relative;
  z-index: 1;
  max-height: calc(11in - 2.3in);
  overflow: hidden;
}

/* ============================================================
   COVER PAGE
   ============================================================ */

.page.cover {
  padding: 0;
  background: var(--navy-deeper);
  background-image:
    radial-gradient(ellipse at top, rgba(13, 148, 136, 0.14), transparent 55%),
    radial-gradient(ellipse at bottom, rgba(201, 169, 97, 0.1), transparent 55%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.cover-topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(to right, var(--gold) 0%, var(--teal-bright) 50%, var(--gold) 100%);
}

.cover-mark {
  position: absolute;
  top: 0.6in;
  left: 0;
  right: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.35em;
  color: var(--gold-dim);
  text-transform: uppercase;
  text-align: center;
}

.cover-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0.7in;
  max-width: 7.5in;
}

.cover-eagle-wrap {
  width: 3.6in;
  height: 3.6in;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 0.25in;
  position: relative;
}
.cover-eagle {
  width: 100%;
  height: auto;
  filter: drop-shadow(0 8px 40px rgba(45, 212, 191, 0.25));
}

.cover-kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10pt;
  letter-spacing: 0.42em;
  color: var(--teal-bright);
  text-transform: uppercase;
  margin-bottom: 0.28in;
}

.cover-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 68pt;
  font-weight: 500;
  line-height: 0.95;
  letter-spacing: -0.025em;
  margin: 0 0 0.22in;
  color: #fff;
}

.cover-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22pt;
  font-style: italic;
  font-weight: 400;
  color: var(--gold-bright);
  margin: 0 0 0.38in;
  line-height: 1.3;
}

.cover-quadrant-chip {
  display: inline-block;
  padding: 12px 30px;
  background: rgba(201, 169, 97, 0.1);
  border: 1px solid rgba(230, 197, 128, 0.55);
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11pt;
  letter-spacing: 0.3em;
  color: var(--gold-bright);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 0.4in;
}

.cover-thesis {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11.5pt;
  font-style: italic;
  color: var(--ink-soft);
  line-height: 1.55;
  max-width: 4.8in;
  margin: 0 auto 0.9in;
  letter-spacing: 0.005em;
}

.cover-footer {
  position: absolute;
  bottom: 0.7in;
  left: 0.75in;
  right: 0.75in;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cover-logo {
  height: 0.7in;
  width: auto;
  opacity: 1;
}

.cover-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.25em;
  color: var(--ink-muted);
  text-transform: uppercase;
  text-align: right;
  line-height: 1.6;
}
.cover-date strong {
  display: block;
  color: var(--gold-bright);
  font-weight: 600;
  margin-bottom: 2pt;
}

.cover-confidential {
  position: absolute;
  bottom: 0.28in;
  left: 0;
  right: 0;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.35em;
  color: rgba(255,255,255,0.22);
  text-transform: uppercase;
}

/* ============================================================
   PAGE HEADER / FOOTER
   ============================================================ */

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 10pt;
  margin-bottom: 22pt;
  border-bottom: 0.5pt solid var(--rule);
  position: relative;
  z-index: 2;
}

.page-header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.page-header-logo {
  height: 26px;
  width: auto;
  opacity: 0.9;
}

.page-header-mark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.22em;
  color: var(--ink-muted);
  text-transform: uppercase;
  border-left: 1px solid var(--rule);
  padding-left: 14px;
  line-height: 1.4;
}
.page-header-mark strong {
  display: block;
  color: var(--gold-bright);
  font-weight: 600;
}

.page-header-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.22em;
  color: var(--ink-muted);
  text-transform: uppercase;
  text-align: right;
  line-height: 1.4;
}
.page-header-right strong {
  display: block;
  color: var(--teal-bright);
  font-weight: 600;
}

.page-footer {
  position: absolute;
  bottom: 0.45in;
  left: 0.75in;
  right: 0.75in;
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.22em;
  color: var(--ink-faint);
  text-transform: uppercase;
  padding-top: 8pt;
  border-top: 0.5pt solid var(--rule-soft);
  z-index: 2;
  background: linear-gradient(to bottom, transparent 0%, var(--navy) 50%);
}

/* ============================================================
   TYPOGRAPHY & SECTION MARKERS
   ============================================================ */

.section-marker {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 12pt;
}
.section-marker-num {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-style: italic;
  font-size: 30pt;
  color: var(--gold-bright);
  line-height: 1;
}
.section-marker-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.3em;
  color: var(--teal-bright);
  text-transform: uppercase;
  font-weight: 600;
  padding-bottom: 4pt;
  border-bottom: 1px solid var(--teal-dim);
  flex: 1;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 500;
  font-size: 34pt;
  line-height: 1.05;
  letter-spacing: -0.012em;
  margin: 0 0 10pt;
  color: #fff;
}

h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 500;
  font-size: 20pt;
  line-height: 1.15;
  margin: 14pt 0 8pt;
  color: #fff;
}

h3 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 14pt;
  line-height: 1.25;
  margin: 14pt 0 6pt;
  color: var(--gold-bright);
}

h4 {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 8.5pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--teal-bright);
  margin: 12pt 0 5pt;
}

p { margin: 0 0 8pt; color: var(--ink-soft); }
em { font-style: italic; color: var(--gold-bright); }
strong { font-weight: 600; color: var(--ink); }

.lede {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14pt;
  font-style: italic;
  line-height: 1.42;
  color: var(--gold-bright);
  margin: 0 0 20pt;
  max-width: 6.5in;
  letter-spacing: 0.005em;
}

.divider {
  height: 1px;
  background: var(--rule);
  margin: 18pt 0;
}

/* ============================================================
   EXECUTIVE SUMMARY
   ============================================================ */

.exec-subject {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24pt;
  align-items: end;
  padding-bottom: 14pt;
  border-bottom: 0.75pt solid var(--gold);
  margin-bottom: 22pt;
}
.exec-subject-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38pt;
  font-weight: 600;
  line-height: 1;
  color: #fff;
  margin: 0 0 6pt;
}
.exec-subject-meta {
  font-family: 'Inter', sans-serif;
  font-size: 10pt;
  color: var(--ink-muted);
  letter-spacing: 0.02em;
}
.exec-subject-right {
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.2em;
  color: var(--ink-muted);
  text-transform: uppercase;
  line-height: 1.5;
}
.exec-subject-right strong {
  display: block;
  color: var(--gold-bright);
  font-size: 9pt;
  font-weight: 600;
}

.hero-scores {
  display: grid;
  grid-template-columns: 1fr 1fr 1.15fr;
  gap: 14pt;
  margin-bottom: 18pt;
}
.hero-score {
  padding: 16pt 18pt 14pt;
  border: 1px solid var(--rule);
  border-radius: 4pt;
  background: rgba(255,255,255,0.025);
  position: relative;
  overflow: hidden;
}
.hero-score::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.hero-score.risk::before { background: var(--teal-bright); }
.hero-score.readiness::before { background: var(--gold-bright); }
.hero-score.hero-quadrant {
  background: linear-gradient(135deg, var(--navy-card) 0%, var(--navy-light) 100%);
  border-color: var(--gold-dim);
}
.hero-score.hero-quadrant::before { background: var(--gold-bright); }

.hero-score-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 8pt;
  font-weight: 600;
}

.hero-score-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 56pt;
  font-weight: 500;
  line-height: 0.9;
  letter-spacing: -0.025em;
  margin-bottom: 8pt;
}
.hero-score.risk .hero-score-value { color: var(--teal-bright); }
.hero-score.readiness .hero-score-value { color: var(--gold-bright); }
.hero-score.hero-quadrant .hero-score-value {
  font-size: 30pt;
  color: var(--gold-bright);
  line-height: 1;
  margin-top: 2pt;
  margin-bottom: 6pt;
}

.hero-score-band {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 3pt;
}
.hero-score-sub {
  font-family: 'Inter', sans-serif;
  font-size: 9pt;
  color: var(--ink-muted);
  font-style: italic;
}

.band-low { color: var(--green); }
.band-high { color: var(--red); }
.band-high-ready { color: var(--green); }
.band-low-ready { color: var(--amber); }
.band-moderate { color: var(--amber); }

.hero-quadrant-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 4pt;
  font-weight: 600;
}
.hero-quadrant-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11pt;
  color: var(--gold-bright);
  line-height: 1.35;
}

/* Wave-tops strip — 4 tiles under hero scores, weighted columns */
.wave-tops {
  display: grid;
  grid-template-columns: 0.85fr 1.4fr 1.4fr 0.85fr;
  gap: 10pt;
  margin: 14pt 0 14pt;
  page-break-inside: avoid;
  break-inside: avoid;
}
.wave-tile {
  padding: 10pt 12pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border-top: 1.5pt solid var(--rule);
  position: relative;
}
.wave-tile.posture { border-top-color: var(--gold-bright); }
.wave-tile.upside { border-top-color: var(--green); }
.wave-tile.risk-watch { border-top-color: var(--amber); }
.wave-tile.confidence { border-top-color: var(--teal-bright); }
.wave-tile-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 6.5pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 700;
  margin-bottom: 5pt;
}
.wave-tile.posture .wave-tile-label { color: var(--gold-bright); }
.wave-tile.upside .wave-tile-label { color: var(--green); }
.wave-tile.risk-watch .wave-tile-label { color: var(--amber); }
.wave-tile.confidence .wave-tile-label { color: var(--teal-bright); }
.wave-tile-head {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14pt;
  font-weight: 600;
  color: #fff;
  line-height: 1.1;
  margin-bottom: 3pt;
}
.wave-tile-sub {
  font-family: 'Inter', sans-serif;
  font-size: 8pt;
  color: var(--ink-soft);
  line-height: 1.4;
  font-style: italic;
}

.analytical-read {
  margin: 16pt 0 14pt;
  padding: 18pt 22pt;
  background: linear-gradient(135deg, rgba(45, 212, 191, 0.06) 0%, rgba(201, 169, 97, 0.08) 100%);
  border: 1px solid var(--gold-dim);
  border-radius: 4pt;
  position: relative;
  page-break-inside: avoid;
  break-inside: avoid;
}
.analytical-read::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--gold-bright), var(--teal-bright));
}
.analytical-read-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 10pt;
  margin-bottom: 10pt;
  padding-bottom: 8pt;
  border-bottom: 0.5pt solid var(--rule-gold);
}
.analytical-read-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.28em;
  color: var(--gold-bright);
  text-transform: uppercase;
  font-weight: 700;
}
.analytical-read-peers {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  color: var(--ink-muted);
  letter-spacing: 0.1em;
}
.analytical-read-peers strong {
  color: var(--teal-bright);
  font-weight: 600;
}
.analytical-read-body {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13pt;
  font-style: italic;
  line-height: 1.5;
  color: #fff;
  margin: 0;
}

/* ============================================================
   POSTURE PAGE
   ============================================================ */

.posture-hero {
  padding: 14pt 18pt;
  background: rgba(201, 169, 97, 0.1);
  border-left: 3pt solid var(--gold-bright);
  border-radius: 2pt;
  margin-bottom: 14pt;
  page-break-inside: avoid;
  break-inside: avoid;
}
.posture-hero-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-bright);
  font-weight: 700;
  margin-bottom: 5pt;
}
.posture-hero-thesis {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14pt;
  font-style: italic;
  color: #fff;
  line-height: 1.4;
  margin: 0;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20pt;
  margin-bottom: 12pt;
}
.two-col h4 { margin-top: 0; }
.two-col .up-label { color: var(--green); }
.two-col .down-label { color: var(--amber); }
.two-col p {
  font-size: 10pt;
  line-height: 1.55;
  color: var(--ink-soft);
  margin: 0;
}

.summary-box {
  padding: 12pt 16pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border-left: 2px solid var(--teal-dim);
}
.summary-box-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--teal-bright);
  font-weight: 600;
  margin-bottom: 5pt;
}
.summary-box-text {
  font-size: 9.5pt;
  line-height: 1.55;
  color: var(--ink-soft);
  margin: 0;
}

/* ============================================================
   QUADRANT
   ============================================================ */

.quadrant-grid {
  display: grid;
  grid-template-columns: 40pt 1fr 1fr;
  grid-template-rows: 16pt 1fr 1fr;
  gap: 8pt;
  margin: 0 auto 14pt;
  max-width: 5.4in;
}
.quadrant-axis-top {
  grid-column: 2 / 4;
  grid-row: 1;
  display: flex;
  justify-content: space-around;
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  letter-spacing: 0.25em;
  color: var(--ink-muted);
  text-transform: uppercase;
  font-weight: 600;
}
.quadrant-axis-left {
  grid-column: 1;
  grid-row: 2 / 4;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
}
.quadrant-axis-left-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  letter-spacing: 0.25em;
  color: var(--ink-muted);
  text-transform: uppercase;
  font-weight: 600;
  transform: rotate(-90deg);
  white-space: nowrap;
}
.q-cell {
  padding: 12pt 12pt;
  border: 0.5pt solid var(--rule);
  border-radius: 3pt;
  background: rgba(255,255,255,0.025);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 0.9in;
  position: relative;
}
.q-cell.q1 { border-left: 3pt solid var(--green); grid-column: 2; grid-row: 2; }
.q-cell.q2 { border-left: 3pt solid var(--teal-bright); grid-column: 2; grid-row: 3; }
.q-cell.q3 { border-left: 3pt solid var(--amber); grid-column: 3; grid-row: 2; }
.q-cell.q4 { border-left: 3pt solid var(--red); grid-column: 3; grid-row: 3; }
.q-cell.active {
  background: linear-gradient(135deg, rgba(201, 169, 97, 0.14) 0%, rgba(45, 212, 191, 0.08) 100%);
  box-shadow: 0 0 0 2pt var(--gold-bright);
}
.q-cell-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18pt;
  font-weight: 600;
  margin-bottom: 3pt;
  letter-spacing: 0.01em;
  line-height: 1;
}
.q-cell.q1 .q-cell-name { color: var(--green); }
.q-cell.q2 .q-cell-name { color: var(--teal-bright); }
.q-cell.q3 .q-cell-name { color: var(--amber); }
.q-cell.q4 .q-cell-name { color: var(--red); }
.q-cell-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 6.5pt;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 6pt;
}
.q-cell-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 9pt;
  font-style: italic;
  color: var(--ink-muted);
  line-height: 1.3;
}
.q-cell.active .q-cell-tagline { color: var(--ink-soft); }
.q-cell-marker {
  display: none;
  margin-top: 6pt;
  padding: 3pt 9pt;
  background: var(--navy);
  border: 1px solid var(--gold-bright);
  color: var(--gold-bright);
  font-family: 'JetBrains Mono', monospace;
  font-size: 6.5pt;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 700;
  border-radius: 2pt;
}
.q-cell.active .q-cell-marker { display: inline-block; }

.quadrant-caption {
  font-size: 8.5pt;
  color: var(--ink-muted);
  font-style: italic;
  text-align: center;
  margin: 14pt auto 0;
  max-width: 5.6in;
  line-height: 1.5;
}

.why-quadrant {
  margin-top: 18pt;
  padding: 14pt 18pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border-left: 2px solid var(--gold-dim);
  page-break-inside: avoid;
  break-inside: avoid;
}
.why-quadrant h3 { margin-top: 0; color: var(--gold-bright); }
.why-quadrant p {
  font-size: 10pt;
  line-height: 1.6;
  color: var(--ink-soft);
  margin: 0;
}

.close-call {
  margin-top: 14pt;
  padding: 12pt 16pt;
  background: rgba(240, 183, 61, 0.1);
  border-left: 3pt solid var(--amber);
  border-radius: 3pt;
  page-break-inside: avoid;
  break-inside: avoid;
}
.close-call-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--amber);
  font-weight: 700;
  margin-bottom: 5pt;
}
.close-call-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11pt;
  font-style: italic;
  color: #fff;
  line-height: 1.45;
}

/* ============================================================
   PATH TO SOA — SPECTRUM VISUALIZATION (new)
   ============================================================ */

.soa-intro {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14pt;
  margin-bottom: 18pt;
}
.soa-intro-card {
  padding: 12pt 16pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border-top: 2pt solid var(--teal-bright);
}
.soa-intro-card.speed { border-top-color: var(--gold-bright); }
.soa-intro-card-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--teal-bright);
  font-weight: 700;
  margin-bottom: 5pt;
}
.soa-intro-card.speed .soa-intro-card-label { color: var(--gold-bright); }
.soa-intro-card-text {
  font-size: 9.5pt;
  color: var(--ink-soft);
  line-height: 1.55;
}

/* THE SPECTRUM — clean track above, grid of journey cards below */
.spectrum-section {
  margin: 20pt 0 8pt;
  page-break-inside: avoid;
  break-inside: avoid;
}
.spectrum-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15pt;
  color: var(--gold-bright);
  font-weight: 600;
  margin: 0 0 6pt;
}
.spectrum-subtitle {
  font-size: 9.5pt;
  color: var(--ink-muted);
  font-style: italic;
  margin-bottom: 16pt;
  max-width: 6in;
  line-height: 1.5;
}

.spectrum {
  position: relative;
  padding: 32pt 0 0;
  margin-bottom: 18pt;
}

.spectrum-current-float {
  position: absolute;
  top: 0;
  transform: translateX(-50%);
  white-space: nowrap;
  text-align: center;
  z-index: 3;
}
.spectrum-current-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18pt;
  font-weight: 500;
  color: #fff;
  line-height: 1;
}
.spectrum-current-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 6.5pt;
  letter-spacing: 0.22em;
  color: var(--teal-bright);
  text-transform: uppercase;
  font-weight: 700;
  margin-top: 3pt;
}

.spectrum-track {
  position: relative;
  height: 12pt;
  background: rgba(255,255,255,0.06);
  border-radius: 6pt;
  overflow: visible;
  margin-top: 8pt;
}
.spectrum-fill {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background: linear-gradient(to right, var(--teal-bright) 0%, var(--gold-bright) 100%);
  border-radius: 6pt;
  box-shadow: 0 0 10pt rgba(45, 212, 191, 0.3);
}
.spectrum-goal-marker {
  position: absolute;
  right: -3pt;
  top: -6pt;
  bottom: -6pt;
  width: 4pt;
  background: var(--gold-bright);
  border-radius: 1pt;
  box-shadow: 0 0 8pt var(--gold-bright);
}
.spectrum-way-pin {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 8pt;
  height: 8pt;
  background: var(--gold-bright);
  border: 1.5pt solid var(--navy);
  border-radius: 50%;
  z-index: 2;
}

.spectrum-tick-row {
  display: flex;
  justify-content: space-between;
  padding: 10pt 0 0;
}
.spectrum-tick {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  color: var(--ink-faint);
  letter-spacing: 0.08em;
}
.spectrum-tick.soa {
  color: var(--gold-bright);
  font-weight: 700;
  letter-spacing: 0.18em;
}

/* Journey cards — grid below the spectrum, no overlap possible */
.journey-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(1.4in, 1fr));
  gap: 10pt;
  margin-top: 16pt;
}
.journey-card {
  padding: 12pt 14pt;
  background: rgba(255,255,255,0.03);
  border-top: 2pt solid var(--gold-bright);
  border-radius: 3pt;
  page-break-inside: avoid;
  break-inside: avoid;
}
.journey-card-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6pt;
  border-bottom: 0.5pt solid var(--rule);
  padding-bottom: 5pt;
}
.journey-card-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16pt;
  font-weight: 600;
  color: var(--gold-bright);
  line-height: 1;
}
.journey-card-target {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  font-weight: 700;
  color: var(--teal-bright);
  letter-spacing: 0.05em;
}
.journey-card-month {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  letter-spacing: 0.2em;
  color: var(--ink-muted);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 5pt;
}
.journey-card-title {
  font-size: 9pt;
  color: var(--ink-soft);
  line-height: 1.4;
  font-weight: 500;
}

/* Milestone narrative cards — below the spectrum */
.milestone-list {
  margin-top: 30pt;
}
.milestone-row {
  display: grid;
  grid-template-columns: 48pt 1fr 90pt;
  gap: 14pt;
  padding: 10pt 0;
  border-bottom: 0.5pt solid var(--rule-soft);
  align-items: start;
  page-break-inside: avoid;
  break-inside: avoid;
}
.milestone-row:last-child { border-bottom: none; }
.milestone-row-num {
  text-align: center;
}
.milestone-row-num-big {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26pt;
  color: var(--gold-bright);
  font-weight: 500;
  line-height: 1;
}
.milestone-row-num-timing {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  color: var(--teal-bright);
  margin-top: 3pt;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
}
.milestone-row-body {
  font-size: 9.5pt;
  color: var(--ink-soft);
  line-height: 1.5;
}
.milestone-row-title {
  color: #fff;
  font-weight: 600;
  margin-bottom: 4pt;
  font-size: 10pt;
}
.milestone-row-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  color: var(--ink-faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: right;
  line-height: 1.6;
}
.milestone-row-meta-status {
  display: inline-block;
  padding: 2pt 6pt;
  border-radius: 2pt;
  font-weight: 700;
  border: 0.5pt solid;
  margin-bottom: 3pt;
}
.feas-good { color: var(--green); border-color: var(--green); }
.feas-moderate { color: var(--amber); border-color: var(--amber); }
.feas-bad { color: var(--red); border-color: var(--red); }
.urg-good { color: var(--green); border-color: var(--green); }
.urg-moderate { color: var(--amber); border-color: var(--amber); }
.urg-bad { color: var(--red); border-color: var(--red); }

/* The blocker callout */
.blocker {
  margin-top: 14pt;
  padding: 12pt 16pt;
  background: rgba(239, 68, 68, 0.1);
  border-left: 3pt solid var(--red);
  border-radius: 3pt;
  page-break-inside: avoid;
  break-inside: avoid;
}
.blocker-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--red);
  font-weight: 700;
  margin-bottom: 5pt;
}
.blocker-text { font-size: 10pt; color: var(--ink-soft); line-height: 1.55; }

.quadrant-drift-warning {
  margin-top: 14pt;
  padding: 14pt 18pt;
  background: rgba(239, 68, 68, 0.12);
  border: 1px solid rgba(239, 68, 68, 0.45);
  border-left: 4pt solid var(--red);
  border-radius: 3pt;
  page-break-inside: avoid;
  break-inside: avoid;
}
.quadrant-drift-warning-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--red);
  font-weight: 700;
  margin-bottom: 6pt;
}
.quadrant-drift-warning-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11pt;
  font-style: italic;
  color: #fff;
  line-height: 1.5;
}

/* Vertical Risk Tier callout — appears on Synthesis page */
.vertical-tier {
  margin-top: 18pt;
  padding: 14pt 18pt;
  background: rgba(255,255,255,0.04);
  border-radius: 3pt;
  border-left: 3pt solid var(--gold-bright);
  page-break-inside: avoid;
  break-inside: avoid;
}
.vertical-tier-high { border-left-color: var(--red); background: rgba(239, 68, 68, 0.08); }
.vertical-tier-moderate { border-left-color: var(--amber); background: rgba(240, 183, 61, 0.08); }
.vertical-tier-low { border-left-color: var(--green); background: rgba(45, 212, 191, 0.06); }
.vertical-tier-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8pt;
  border-bottom: 0.5pt solid var(--rule);
  padding-bottom: 6pt;
}
.vertical-tier-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 700;
}
.vertical-tier-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13pt;
  font-weight: 600;
  color: #fff;
}
.vertical-tier-high .vertical-tier-value { color: #ff8a80; }
.vertical-tier-moderate .vertical-tier-value { color: var(--amber); }
.vertical-tier-low .vertical-tier-value { color: var(--green); }
.vertical-tier-rationale {
  font-size: 9.5pt;
  line-height: 1.55;
  color: var(--ink-soft);
  margin-bottom: 10pt;
}
.vertical-tier-floors-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 700;
  margin-bottom: 5pt;
}
.vertical-tier-floors-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(80pt, 1fr));
  gap: 6pt;
}
.vertical-tier-floor {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5pt;
  padding: 5pt 8pt;
  background: rgba(0,0,0,0.18);
  border-radius: 2pt;
  text-align: center;
}
.vertical-tier-floor-id {
  color: var(--gold-bright);
  font-weight: 700;
  margin-right: 4pt;
}
.vertical-tier-floor-val {
  color: var(--ink-soft);
}
.vertical-tier-floors-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  color: var(--ink-muted);
  font-style: italic;
}

/* Transition paragraphs between pages */
.page-transition {
  margin-top: 12pt;
  padding: 7pt 12pt 7pt 16pt;
  border-left: 2pt solid var(--gold-dim);
  font-family: 'Cormorant Garamond', serif;
  font-size: 9.5pt;
  font-style: italic;
  color: var(--ink-muted);
  line-height: 1.4;
  page-break-inside: avoid;
  break-inside: avoid;
}
.page-transition::before {
  content: '→ ';
  color: var(--gold-bright);
  font-style: normal;
  font-weight: 700;
  margin-right: 3pt;
}

/* Section dividers — visible label at top of first page in each section */
.section-divider {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.32em;
  color: var(--gold-bright);
  font-weight: 700;
  text-transform: uppercase;
  padding: 6pt 0 5pt;
  border-bottom: 0.5pt solid var(--gold-dim);
  margin-bottom: 10pt;
}

/* How to Read page — 2x3 grid of explainer blocks */
.howto-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14pt 18pt;
  margin-top: 14pt;
}
.howto-block {
  padding: 12pt 14pt;
  background: rgba(255,255,255,0.025);
  border-radius: 3pt;
  border-left: 2pt solid var(--teal-bright);
  page-break-inside: avoid;
  break-inside: avoid;
}
.howto-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-bright);
  font-weight: 700;
  margin-bottom: 6pt;
}
.howto-block p {
  font-size: 8.5pt;
  line-height: 1.45;
  color: var(--ink-soft);
  margin: 0 0 4pt;
}
.howto-block p:last-child { margin-bottom: 0; }
.howto-block strong { color: #fff; font-weight: 600; }

/* ============================================================
   TRAJECTORY PAGE (separate page for T0→T1)
   ============================================================ */

.trajectory {
  display: grid;
  grid-template-columns: 1fr 48pt 1fr;
  gap: 16pt;
  margin: 14pt 0;
}
.trajectory-node {
  padding: 18pt 22pt;
  background: rgba(255,255,255,0.03);
  border-radius: 4pt;
  border: 0.5pt solid var(--rule);
}
.trajectory-node.t1 {
  background: rgba(201, 169, 97, 0.1);
  border-color: var(--gold-dim);
}
.trajectory-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 8pt;
  font-weight: 600;
}
.trajectory-node.t1 .trajectory-label { color: var(--gold-bright); }
.trajectory-posture {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22pt;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4pt;
  line-height: 1;
}
.trajectory-scores {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10pt;
  color: var(--ink-muted);
  margin-bottom: 10pt;
  letter-spacing: 0.05em;
}
.trajectory-note {
  font-size: 9.5pt;
  font-style: italic;
  color: var(--ink-soft);
  line-height: 1.5;
}
.trajectory-arrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 40pt;
  color: var(--gold-bright);
  text-align: center;
  line-height: 1;
  align-self: center;
}

.trajectory-narrative {
  margin-top: 12pt;
  padding: 14pt 18pt;
  background: rgba(255,255,255,0.025);
  border-left: 2px solid var(--teal-dim);
  border-radius: 2pt;
  font-size: 10pt;
  line-height: 1.6;
  color: var(--ink-soft);
  font-style: italic;
}

/* ============================================================
   FACTOR SCORECARDS
   ============================================================ */

.factor-section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--teal-bright);
  font-weight: 700;
  padding-bottom: 5pt;
  border-bottom: 0.75pt solid var(--teal-dim);
  margin-bottom: 10pt;
}
.factor-section-label.readiness {
  color: var(--gold-bright);
  border-bottom-color: var(--gold-dim);
}
.factor-section-label strong { color: #fff; font-weight: 700; }

.peer-callout {
  padding: 12pt 16pt;
  background: rgba(45, 212, 191, 0.06);
  border-left: 3pt solid var(--teal-bright);
  border-radius: 3pt;
  margin-bottom: 14pt;
  page-break-inside: avoid;
  break-inside: avoid;
}
.peer-callout.readiness {
  border-left-color: var(--gold-bright);
  background: rgba(201, 169, 97, 0.06);
}
.peer-callout-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--teal-bright);
  font-weight: 700;
  margin-bottom: 4pt;
}
.peer-callout.readiness .peer-callout-label { color: var(--gold-bright); }
.peer-callout-label-binding { color: var(--red) !important; }
.peer-callout-text {
  font-size: 9.5pt;
  line-height: 1.5;
  color: var(--ink-soft);
  font-style: italic;
}
.peer-callout-divider {
  height: 1px;
  background: var(--rule);
  margin: 8pt 0;
}

.factor-definition {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6pt;
  margin-top: 3pt;
  margin-bottom: 4pt;
  padding: 5pt 8pt;
  background: rgba(255,255,255,0.025);
  border-radius: 2pt;
  border-left: 2pt solid rgba(45, 212, 191, 0.45);
}
.factor-definition.readiness { border-left-color: rgba(201, 169, 97, 0.5); }
.factor-definition-block { }
.factor-definition-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 6pt;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--teal-bright);
  font-weight: 700;
  margin-bottom: 1pt;
}
.factor-definition.readiness .factor-definition-label { color: var(--gold-bright); }
.factor-definition-text {
  font-size: 7.5pt;
  line-height: 1.35;
  color: var(--ink-soft);
  font-style: italic;
}

.factor {
  display: grid;
  grid-template-columns: 36pt 1fr 72pt;
  gap: 12pt;
  padding: 6pt 0;
  border-bottom: 0.5pt solid var(--rule-soft);
  page-break-inside: avoid;
  break-inside: avoid;
}
.factor:last-child { border-bottom: none; }
.factor-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  font-weight: 700;
  color: var(--gold-bright);
  padding-top: 2pt;
  letter-spacing: 0.05em;
}
.factor-name {
  font-size: 9.5pt;
  font-weight: 600;
  color: #fff;
  margin-bottom: 3pt;
}
.factor-rationale {
  font-size: 8.5pt;
  color: var(--ink-soft);
  line-height: 1.4;
}
.factor-num-block {
  text-align: right;
  padding-top: 2pt;
}
.factor-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22pt;
  font-weight: 500;
  line-height: 1;
  color: #fff;
}
.factor-num.good { color: var(--green); }
.factor-num.moderate { color: var(--amber); }
.factor-num.bad { color: var(--red); }
.factor-weight {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  color: var(--ink-faint);
  margin-top: 2pt;
  letter-spacing: 0.08em;
}
.factor-contribution {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  color: var(--gold-bright);
  font-weight: 600;
  margin-top: 2pt;
  letter-spacing: 0.05em;
}

/* ============================================================
   BRIDGE PAGE
   ============================================================ */

.priority-list { list-style: none; padding: 0; margin: 0; counter-reset: priority; }
.priority-list li {
  padding: 10pt 14pt 10pt 42pt;
  margin-bottom: 9pt;
  background: rgba(255,255,255,0.03);
  border-left: 3pt solid var(--teal-bright);
  border-radius: 3pt;
  position: relative;
  font-size: 9.5pt;
  line-height: 1.55;
  color: var(--ink-soft);
  counter-increment: priority;
  page-break-inside: avoid;
  break-inside: avoid;
}
.priority-list li::before {
  content: counter(priority);
  position: absolute;
  left: 14pt;
  top: 10pt;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18pt;
  line-height: 1;
  color: var(--gold-bright);
  font-weight: 500;
}

.trigger-list { list-style: none; padding: 0; margin: 0; }
.trigger-list li {
  padding: 9pt 14pt 9pt 30pt;
  margin-bottom: 7pt;
  background: rgba(240, 183, 61, 0.08);
  border-left: 3pt solid var(--amber);
  border-radius: 3pt;
  position: relative;
  font-size: 9pt;
  line-height: 1.5;
  color: var(--ink-soft);
  page-break-inside: avoid;
  break-inside: avoid;
}
.trigger-list li::before {
  content: "⚠";
  position: absolute;
  left: 12pt;
  top: 9pt;
  color: var(--amber);
  font-weight: 700;
  font-size: 10pt;
}

.evidence-list { padding-left: 16pt; margin: 0; }
.evidence-list li {
  margin-bottom: 6pt;
  font-size: 8.5pt;
  line-height: 1.55;
  color: var(--ink-soft);
}
.evidence-list li::marker { color: var(--gold); }

.method-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14pt;
  margin-bottom: 16pt;
}
.method-block {
  padding: 12pt 14pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border-top: 2pt solid var(--teal-bright);
}
.method-block h4 { margin-top: 0; color: var(--teal-bright); }
.method-block p {
  font-size: 9pt;
  line-height: 1.55;
  color: var(--ink-soft);
  margin: 0;
}

.run-details-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10pt;
  margin-bottom: 14pt;
}
.run-detail {
  padding: 10pt 12pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border-left: 2pt solid var(--teal-dim);
}
.run-detail-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 6.5pt;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 4pt;
  font-weight: 600;
}
.run-detail-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10pt;
  color: #fff;
  font-weight: 500;
}

.confidence-box {
  padding: 14pt 18pt;
  background: rgba(201, 169, 97, 0.1);
  border-left: 3pt solid var(--gold-bright);
  border-radius: 3pt;
  margin-bottom: 14pt;
  page-break-inside: avoid;
  break-inside: avoid;
}
.confidence-box-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-bright);
  font-weight: 700;
  margin-bottom: 5pt;
}
.confidence-box-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18pt;
  font-weight: 600;
  color: #fff;
  margin-bottom: 6pt;
  line-height: 1;
}
.confidence-box-rationale {
  font-size: 9.5pt;
  color: var(--ink-soft);
  line-height: 1.55;
  font-style: italic;
}

.final-note {
  margin-top: 18pt;
  padding-top: 10pt;
  border-top: 0.5pt solid var(--rule);
  font-size: 8pt;
  color: var(--ink-faint);
  line-height: 1.55;
  font-style: italic;
}

/* ============================================================
   SCREEN TOOLBAR
   ============================================================ */

.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #000;
  color: #fff;
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  border-bottom: 1px solid var(--gold-dim);
}
.toolbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.85);
}
.toolbar-logo { height: 24px; }
.toolbar-buttons { display: flex; gap: 10px; }
.tb-btn {
  padding: 8px 18px;
  border: none;
  border-radius: 2px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.tb-btn-primary { background: var(--gold-bright); color: var(--navy); }
.tb-btn-primary:hover { background: var(--gold); }
.tb-btn-secondary {
  background: transparent;
  color: rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.25);
}
.tb-btn-secondary:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.5);
}

.empty-state {
  max-width: 500px;
  margin: 80px auto;
  padding: 44px;
  background: var(--navy-card);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  text-align: center;
  font-family: 'Inter', sans-serif;
  color: var(--ink);
}
.empty-state h2 {
  font-family: 'Cormorant Garamond', serif;
  color: var(--gold-bright);
  margin: 0 0 12px;
  font-size: 28px;
}
.empty-state p { color: var(--ink-soft); line-height: 1.6; }
.empty-state a {
  display: inline-block;
  margin-top: 18px;
  padding: 10px 26px;
  background: var(--gold-bright);
  color: var(--navy);
  text-decoration: none;
  border-radius: 2px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 12px;
}

/* ============================================================
   PRINT
   ============================================================ */

@page {
  size: letter;
  margin: 0;
  background: var(--navy);
}

@media print {
  html, body { background: var(--navy); }
  .toolbar, .empty-state { display: none !important; }
  .page {
    margin: 0;
    box-shadow: none;
    width: 8.5in;
    height: 11in;
    page-break-after: always;
    break-after: page;
  }
  .page:last-child {
    page-break-after: auto;
    break-after: auto;
  }
  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }
  .analytical-read, .posture-hero, .close-call, .blocker,
  .milestone-row, .factor, .priority-list li, .trigger-list li,
  .peer-callout, .confidence-box, .hero-scores, .trajectory,
  .spectrum-section, .why-quadrant {
    page-break-inside: avoid;
    break-inside: avoid;
  }
  h1, h2, h3 {
    page-break-after: avoid;
    break-after: avoid;
  }
}

@media (max-width: 900px) {
  .page { width: 100%; padding: 24px; height: auto; min-height: auto; }
  .hero-scores { grid-template-columns: 1fr; gap: 12pt; }
  .two-col { grid-template-columns: 1fr; gap: 12pt; }
  .soa-intro { grid-template-columns: 1fr; }
  .trajectory { grid-template-columns: 1fr; }
  .trajectory-arrow { transform: rotate(90deg); font-size: 28pt; }
  .run-details-grid { grid-template-columns: 1fr 1fr; }
  .method-grid { grid-template-columns: 1fr; }
  .cover-title { font-size: 48pt; }
  .spectrum { transform: scale(0.8); transform-origin: left center; }
}
</style>

function riskThreatBand(score) {
  if (score <= 25) return { label: 'LOW THREAT', sub: 'Well inside boundary', cls: 'band-low' };
  if (score <= 50) return { label: 'LOW THREAT', sub: 'Near boundary — monitor', cls: 'band-low' };
  if (score <= 70) return { label: 'HIGH THREAT', sub: 'Actionable — accelerate', cls: 'band-moderate' };
  return { label: 'HIGH THREAT', sub: 'Critical — urgent', cls: 'band-high' };
}
function readinessBand(score) {
  if (score >= 75) return { label: 'HIGH READINESS', sub: 'Best-in-class foundation', cls: 'band-high-ready' };
  if (score > 50)  return { label: 'HIGH READINESS', sub: 'Solid foundation', cls: 'band-high-ready' };
  if (score >= 40) return { label: 'LOW READINESS', sub: 'Developing — BUILD MODE territory', cls: 'band-low-ready' };
  return { label: 'LOW READINESS', sub: 'Early-stage foundation', cls: 'band-high' };
}
function determineQuadrant(riskScore, readinessScore) {
  const lowThreat = riskScore <= 50;
  const highReady = readinessScore > 50;
  if (lowThreat && highReady) return { id: 'q1', name: 'EXECUTE', sub: 'Low Threat · High Readiness', tagline: 'Moat intact. Foundations ready.' };
  if (!lowThreat && highReady) return { id: 'q3', name: 'RACE MODE', sub: 'High Threat · High Readiness', tagline: 'Foundations ready. Window compressing.' };
  if (lowThreat && !highReady) return { id: 'q2', name: 'BUILD MODE', sub: 'Low Threat · Low Readiness', tagline: 'Moat intact. Foundations emerging.' };
  return { id: 'q4', name: 'DANGER ZONE', sub: 'High Threat · Low Readiness', tagline: 'Pressure outpacing feasible execution.' };
}
function factorScoreClass(score, isRisk) {
  if (isRisk) { if (score <= 30) return 'good'; if (score <= 60) return 'moderate'; return 'bad'; }
  if (score >= 70) return 'good'; if (score >= 45) return 'moderate'; return 'bad';
}
function calculateWeightedScore(scores, factors) {
  let total = 0;
  for (const f of factors) if (scores[f.id]) total += (scores[f.id].score * f.weight) / 100;
  return total;
}
function feasClass(v) {
  if (v === 'ACHIEVABLE') return 'feas-good';
  if (v === 'AT RISK') return 'feas-moderate';
  return 'feas-bad';
}
function urgClass(v) {
  if (v === 'LOW') return 'urg-good';
  if (v === 'MODERATE') return 'urg-moderate';
  return 'urg-bad';
}
function esc(text) {
  if (text == null) return '';
  return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function truncateAtWord(text, maxLen) {
  if (!text) return '';
  const s = String(text).trim();
  if (s.length <= maxLen) return s;
  const cut = s.slice(0, maxLen);
  const lastSpace = cut.lastIndexOf(' ');
  return (lastSpace > 0 ? cut.slice(0, lastSpace) : cut).trim() + '…';
}

function loadPayload() {
  const params = new URLSearchParams(window.location.search);
  const key = params.get('id') || 'perch_last_report';
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { console.error(e); return null; }
}

async function loadPayloadFromDb(runId) {
  const r = await fetch('/api/runs/' + encodeURIComponent(runId));
  if (!r.ok) {
    const errBody = await r.json().catch(() => ({ error: 'HTTP ' + r.status }));
    throw new Error(errBody.error || 'Failed to load run');
  }
  const data = await r.json();
  if (!data.payload) throw new Error('Run returned no payload');
  return data.payload;
}

function renderSpectrum(currentScore, milestones, maxScore = 100, type = 'readiness') {
  const current = Math.max(0, Math.min(100, currentScore));
  const sortedMs = [...milestones].sort((a, b) => (a.number || 0) - (b.number || 0));
  const totalMs = sortedMs.length;

  const waypoints = sortedMs.map((m, i) => {
    const progress = (i + 1) / totalMs;
    const target = Math.min(100, current + (100 - current) * progress);
    return {
      target: Math.round(target),
      month: m.target_month || '?',
      number: m.number || (i + 1),
      title: m.milestone ? (m.milestone.length > 80 ? m.milestone.slice(0, 77).trim() + '…' : m.milestone) : ''
    };
  });

  const fillPct = current;

  let html = `
    <div class="spectrum-section">
      <div class="spectrum-title">Path to SOA · Readiness Spectrum</div>
      <div class="spectrum-subtitle">Readiness of 100 = full System of Action — outcome-tier pricing, compounding AI loop in production, durable ARPU expansion. Current position tracked on the spectrum. Milestones below.</div>

      <div class="spectrum">
        <div class="spectrum-current-float" style="left: ${fillPct}%;">
          <div class="spectrum-current-value">${current.toFixed(1)}</div>
          <div class="spectrum-current-label">You Are Here</div>
        </div>
        <div class="spectrum-track">
          <div class="spectrum-fill" style="width: ${fillPct}%;"></div>
          ${waypoints.map(w => `<div class="spectrum-way-pin" style="left: ${w.target}%;" title="Milestone ${w.number}: target ${w.target}"></div>`).join('')}
          <div class="spectrum-goal-marker"></div>
        </div>
        <div class="spectrum-tick-row">
          <span class="spectrum-tick">0</span>
          <span class="spectrum-tick">25</span>
          <span class="spectrum-tick">50</span>
          <span class="spectrum-tick">75</span>
          <span class="spectrum-tick soa">SOA · 100</span>
        </div>
      </div>

      <div class="journey-grid">
        ${waypoints.map(w => `
          <div class="journey-card">
            <div class="journey-card-top">
              <span class="journey-card-num">M${w.number}</span>
              <span class="journey-card-target">→ ${w.target}</span>
            </div>
            <div class="journey-card-month">Target: Month ${w.month}</div>
            <div class="journey-card-title">${esc(w.title)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  return html;
}

                  <div class="factor-definition-text">${esc(f.why_matters || '')}</div>
                </div>
              </div>
              <div class="factor-rationale">${esc(s.rationale)}</div>
            </div>
            <div class="factor-num-block">
              <div class="factor-num ${cls}">${s.score}</div>
              <div class="factor-weight">Weight ${f.weight}%</div>
              <div class="factor-contribution">${contribution} pts</div>
            </div>
          </div>
        `;
      }).join('')}

      <div class="page-transition">Risk sets the clock; Readiness sets the pace at which the company can actually build. Together they place the company in one of four operating modes — and that placement prescribes the posture the Bridge must adopt.</div>

      ${pageFooter(6)}
    </div>
  `;

  // ============= PAGE 10 — BRIDGE · PRIORITIES =============
  const bridgePage = `
    <div class="page content">
      ${pageHeader(company.name, 'Bridge Focus', 10)}
      <div class="section-divider">OPERATING OUTPUT · WHAT WE DO ABOUT IT</div>
      ${sectionMarker(10, 'Bridge Focus · Priorities')}
      <h1>Bridge Focus</h1>
      <p class="lede">Where the Bridge concentrates attention during the hold — sequenced by what unlocks the SOA path fastest.</p>

      <h3>Gap-to-Target Priorities</h3>
      <p style="font-size: 9pt; color: var(--ink-muted); margin-bottom: 10pt; font-style: italic;">Each priority tied to the readiness gap it closes and the feasibility window it operates within.</p>
      <ol class="priority-list">
        ${(result.gap_to_target || []).map(g => `<li>${esc(g)}</li>`).join('')}
      </ol>

      <div class="page-transition">The plan names the priorities. Monitoring names the signals that would force us to rewrite it — observable events that, if they fire, trigger a mid-hold re-score and thesis review.</div>

      ${pageFooter(10)}
    </div>
  `;

  // ============= PAGE 11 — MONITORING · THRESHOLD TRIGGERS =============
  const monitoringPage = `
    <div class="page content">
      ${pageHeader(company.name, 'Monitoring', 11)}
      ${sectionMarker(11, 'Monitoring · Threshold Triggers')}
      <h1>Monitoring</h1>
      <p class="lede">Observable events that would force re-underwrite. SOAR watches these quarterly — any trigger firing prompts a mid-hold re-score and thesis review.</p>

      <h3>Threshold Triggers</h3>
      <p style="font-size: 9pt; color: var(--ink-muted); margin-bottom: 10pt; font-style: italic;">Each trigger names the event, the factor it would shift, and the magnitude of that shift.</p>
      <ul class="trigger-list">
        ${(result.threshold_triggers || []).map(t => `<li>${esc(t)}</li>`).join('')}
      </ul>

      <div class="page-transition">Every claim in this memo is traceable. The final page names the evidence base, confidence read, and methodology details — the audit trail a partner can inspect before committing capital.</div>

      ${pageFooter(11)}
    </div>
  `;

  // ============= PAGE 12 — EVIDENCE + METHODOLOGY =============
  const closingPage = `
    <div class="page content">
      ${pageHeader(company.name, 'Evidence · Audit', 12)}
      ${sectionMarker(12, 'Evidence · Confidence · Audit')}
      <h1>Evidence &amp; Audit</h1>
      <p class="lede">The primary sources anchoring this scoring, the confidence read, and full methodology detail for partner inspection.</p>

      <h3>Key Evidence Base</h3>
      <ul class="evidence-list">
        ${(result.key_evidence || []).map(e => `<li>${esc(e)}</li>`).join('')}
      </ul>

      <div class="divider"></div>

      <h3>Evidence Confidence</h3>
      <div class="confidence-box">
        <div class="confidence-box-label">Overall Confidence for This Run</div>
        <div class="confidence-box-value">${esc(result.confidence_level || 'Moderate')}</div>
        <div class="confidence-box-rationale">${esc(result.confidence_rationale || '—')}</div>
      </div>

      <h3>Run Details</h3>
      <div class="run-details-grid">
        <div class="run-detail">
          <div class="run-detail-label">Searches Performed</div>
          <div class="run-detail-value">${meta && meta.searches_performed != null ? meta.searches_performed : '—'}</div>
        </div>
        <div class="run-detail">
          <div class="run-detail-label">Pages Fetched</div>
          <div class="run-detail-value">${meta && meta.pages_fetched != null ? meta.pages_fetched : '—'}</div>
        </div>
        <div class="run-detail">
          <div class="run-detail-label">Extended Thinking</div>
          <div class="run-detail-value">${meta && meta.extended_thinking_used ? 'Yes' : 'No'}</div>
        </div>
        <div class="run-detail">
          <div class="run-detail-label">Model</div>
          <div class="run-detail-value" style="font-size: 8pt;">${esc(meta && meta.model || '—')}</div>
        </div>
        <div class="run-detail">
          <div class="run-detail-label">Input Tokens</div>
          <div class="run-detail-value">${meta && meta.usage && meta.usage.input_tokens ? meta.usage.input_tokens.toLocaleString() : '—'}</div>
        </div>
        <div class="run-detail">
          <div class="run-detail-label">Output Tokens</div>
          <div class="run-detail-value">${meta && meta.usage && meta.usage.output_tokens ? meta.usage.output_tokens.toLocaleString() : '—'}</div>
        </div>
      </div>

      <div class="final-note">
        Generated by Eagle Vision · PERCH on ${esc(fmtDate(generatedAt))}. Point-in-time assessment based on evidence available at run time. Scores and posture may shift as new evidence emerges or as the company executes. Distribution limited to AQL Growth partners and authorized recipients.
      </div>

      ${pageFooter(12)}
    </div>
  `;

  document.getElementById('root').innerHTML =
    coverPage + howToReadPage + execSummaryPage + waveTopsPage + posturePage +
    riskFactorPage + readinessFactorPage +
    quadrantPage + soaPathPage + milestoneDetailPage +
    bridgePage + monitoringPage + closingPage;
}

document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const runId = params.get('run_id');

  let payload = null;
  if (runId) {
    document.getElementById('root').innerHTML = `<div class="empty-state"><h2>Loading run #${runId}…</h2><p style="margin-top:14px;">Fetching from PERCH corpus.</p></div>`;
    try {
      payload = await loadPayloadFromDb(runId);
    } catch (err) {
      console.error('Failed to load run from DB:', err);
      document.getElementById('root').innerHTML = `
        <div class="empty-state">
          <h2>Could not load run #${runId}</h2>
          <p>${err.message || 'Unknown error'}. Try opening from the dashboard, or run a new analysis.</p>
          <a href="/dashboard.html">← Back to Dashboard</a>
        </div>
      `;
      document.querySelector('.toolbar').style.display = 'none';
      return;
    }
  } else {
    payload = loadPayload();
  }

  if (!payload || !payload.result || !payload.company) {
    renderEmptyState();
    return;
  }
  renderReport(payload);
});
</script>
</body>
</html>
