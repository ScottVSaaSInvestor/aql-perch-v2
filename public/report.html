<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQL Growth · PERCH · IC Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   AQL GROWTH — PERCH IC REPORT · DARK EDITION
   ============================================================ */

:root {
  --navy: #0a1424;
  --navy-mid: #0f1b2d;
  --navy-card: #17263d;
  --navy-light: #1e3050;
  --navy-deeper: #050b17;
  --gold: #c9a961;
  --gold-bright: #e6c580;
  --gold-dim: rgba(201, 169, 97, 0.5);
  --teal: #0d9488;
  --teal-bright: #2dd4bf;
  --teal-dim: rgba(45, 212, 191, 0.45);
  --green: #4ade80;
  --amber: #f0b73d;
  --red: #ef4444;
  --ink: rgba(255, 255, 255, 0.94);
  --ink-soft: rgba(255, 255, 255, 0.78);
  --ink-muted: rgba(255, 255, 255, 0.55);
  --ink-faint: rgba(255, 255, 255, 0.35);
  --rule: rgba(255, 255, 255, 0.1);
  --rule-soft: rgba(255, 255, 255, 0.06);
  --rule-gold: rgba(201, 169, 97, 0.3);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: #1a1a1a;
  color: var(--ink);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 10.5pt;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============================================================
   PAGE CONTAINER — all pages dark navy
   ============================================================ */

.page {
  width: 8.5in;
  min-height: 11in;
  padding: 0.7in 0.75in 0.9in;
  margin: 28px auto;
  background: var(--navy);
  background-image:
    radial-gradient(ellipse at top right, rgba(13, 148, 136, 0.06), transparent 60%),
    radial-gradient(ellipse at bottom left, rgba(201, 169, 97, 0.04), transparent 60%);
  box-shadow: 0 12px 48px rgba(0,0,0,0.4);
  page-break-after: always;
  break-after: page;
  page-break-inside: avoid;
  position: relative;
  overflow: hidden;
  color: var(--ink);
}
.page:last-child { page-break-after: auto; }

/* Thin accent bar at top of every content page */
.page.content::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(to right, var(--gold-bright) 0%, var(--teal-bright) 50%, var(--gold-bright) 100%);
  opacity: 0.85;
}

/* ============================================================
   COVER PAGE
   ============================================================ */

.page.cover {
  padding: 0;
  background: var(--navy-deeper);
  background-image:
    radial-gradient(ellipse at top, rgba(13, 148, 136, 0.12), transparent 55%),
    radial-gradient(ellipse at bottom, rgba(201, 169, 97, 0.08), transparent 55%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.cover-topbar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(to right, var(--gold) 0%, var(--teal-bright) 50%, var(--gold) 100%);
}

.cover-mark {
  position: absolute;
  top: 0.55in;
  left: 0;
  right: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.35em;
  color: var(--gold-dim);
  text-transform: uppercase;
  text-align: center;
}

.cover-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0.6in;
  max-width: 7in;
}

.cover-eagle {
  width: 3.8in;
  height: auto;
  margin: 0 auto 0.2in;
  display: block;
  filter: drop-shadow(0 6px 30px rgba(45, 212, 191, 0.2));
}

.cover-kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10pt;
  letter-spacing: 0.4em;
  color: var(--teal-bright);
  text-transform: uppercase;
  margin-bottom: 0.28in;
}

.cover-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 68pt;
  font-weight: 500;
  line-height: 0.95;
  letter-spacing: -0.025em;
  margin: 0 0 0.22in;
  color: #fff;
}

.cover-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22pt;
  font-style: italic;
  font-weight: 400;
  color: var(--gold-bright);
  margin: 0 0 0.4in;
  line-height: 1.3;
}

.cover-quadrant-chip {
  display: inline-block;
  padding: 11px 28px;
  background: rgba(201, 169, 97, 0.08);
  border: 1px solid rgba(230, 197, 128, 0.5);
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11pt;
  letter-spacing: 0.28em;
  color: var(--gold-bright);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 0.5in;
}

.cover-thesis {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16pt;
  font-style: italic;
  color: var(--ink-soft);
  line-height: 1.45;
  max-width: 5.5in;
  margin: 0 auto 0.2in;
}

.cover-footer {
  position: absolute;
  bottom: 0.7in;
  left: 0.75in;
  right: 0.75in;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cover-logo {
  height: 0.5in;
  width: auto;
  opacity: 0.95;
  filter: brightness(0) invert(1);
}

.cover-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.22em;
  color: var(--ink-muted);
  text-transform: uppercase;
  text-align: right;
  line-height: 1.6;
}
.cover-date strong { display: block; color: var(--gold-bright); font-weight: 600; }

.cover-confidential {
  position: absolute;
  bottom: 0.3in;
  left: 0;
  right: 0;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
}

/* ============================================================
   PAGE HEADER / FOOTER (content pages)
   ============================================================ */

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 12pt;
  margin-bottom: 26pt;
  border-bottom: 0.5pt solid var(--rule);
}

.page-header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.page-header-logo {
  height: 26px;
  width: auto;
  filter: brightness(0) invert(1);
  opacity: 0.85;
}

.page-header-mark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.22em;
  color: var(--ink-muted);
  text-transform: uppercase;
  border-left: 1px solid var(--rule);
  padding-left: 14px;
  line-height: 1.4;
}
.page-header-mark strong { display: block; color: var(--gold-bright); font-weight: 600; }

.page-header-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.22em;
  color: var(--ink-muted);
  text-transform: uppercase;
  text-align: right;
  line-height: 1.4;
}
.page-header-right strong { display: block; color: var(--teal-bright); font-weight: 600; }

.page-footer {
  position: absolute;
  bottom: 0.45in;
  left: 0.75in;
  right: 0.75in;
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.22em;
  color: var(--ink-faint);
  text-transform: uppercase;
  padding-top: 10pt;
  border-top: 0.5pt solid var(--rule-soft);
}

/* ============================================================
   TYPOGRAPHY & SECTIONS
   ============================================================ */

.section-marker {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 14pt;
}
.section-marker-num {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-style: italic;
  font-size: 32pt;
  color: var(--gold-bright);
  line-height: 1;
}
.section-marker-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.3em;
  color: var(--teal-bright);
  text-transform: uppercase;
  font-weight: 600;
  padding-bottom: 4pt;
  border-bottom: 1px solid var(--teal-dim);
  flex: 1;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 500;
  font-size: 38pt;
  line-height: 1.05;
  letter-spacing: -0.012em;
  margin: 0 0 12pt;
  color: #fff;
}

h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 500;
  font-size: 22pt;
  line-height: 1.15;
  margin: 18pt 0 10pt;
  color: #fff;
}

h3 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 15pt;
  line-height: 1.25;
  margin: 16pt 0 6pt;
  color: var(--gold-bright);
}

h4 {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 8.5pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--teal-bright);
  margin: 14pt 0 5pt;
}

p { margin: 0 0 9pt; color: var(--ink-soft); }
em { font-style: italic; color: var(--gold-bright); }
strong { font-weight: 600; color: var(--ink); }

.lede {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16pt;
  font-style: italic;
  line-height: 1.42;
  color: var(--gold-bright);
  margin: 0 0 24pt;
  max-width: 6.5in;
  letter-spacing: 0.005em;
}

.divider {
  height: 1px;
  background: var(--rule);
  margin: 22pt 0;
}

/* ============================================================
   PAGE 1 — EXECUTIVE SUMMARY
   ============================================================ */

.exec-subject {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24pt;
  align-items: end;
  padding-bottom: 16pt;
  border-bottom: 0.75pt solid var(--gold);
  margin-bottom: 26pt;
}
.exec-subject-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42pt;
  font-weight: 600;
  line-height: 1;
  color: #fff;
  margin: 0 0 6pt;
}
.exec-subject-meta {
  font-family: 'Inter', sans-serif;
  font-size: 10pt;
  color: var(--ink-muted);
  letter-spacing: 0.02em;
}
.exec-subject-right {
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.2em;
  color: var(--ink-muted);
  text-transform: uppercase;
  line-height: 1.5;
}
.exec-subject-right strong {
  display: block;
  color: var(--gold-bright);
  font-size: 9pt;
  font-weight: 600;
}

/* Hero scores */
.hero-scores {
  display: grid;
  grid-template-columns: 1fr 1fr 1.15fr;
  gap: 14pt;
  margin-bottom: 22pt;
}

.hero-score {
  padding: 18pt 20pt 16pt;
  border: 1px solid var(--rule);
  border-radius: 4pt;
  background: rgba(255,255,255,0.02);
  position: relative;
  overflow: hidden;
}
.hero-score::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
}
.hero-score.risk::before { background: var(--teal-bright); }
.hero-score.readiness::before { background: var(--gold-bright); }
.hero-score.hero-quadrant {
  background: linear-gradient(135deg, var(--navy-card) 0%, var(--navy-light) 100%);
  border-color: var(--gold-dim);
}
.hero-score.hero-quadrant::before { background: var(--gold-bright); }

.hero-score-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 10pt;
  font-weight: 600;
}

.hero-score-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 62pt;
  font-weight: 500;
  line-height: 0.9;
  letter-spacing: -0.025em;
  margin-bottom: 10pt;
}
.hero-score.risk .hero-score-value { color: var(--teal-bright); }
.hero-score.readiness .hero-score-value { color: var(--gold-bright); }
.hero-score.hero-quadrant .hero-score-value {
  font-size: 34pt;
  color: var(--gold-bright);
  line-height: 1;
  margin-top: 4pt;
  margin-bottom: 6pt;
}

.hero-score-band {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 3pt;
}
.hero-score-sub {
  font-family: 'Inter', sans-serif;
  font-size: 9pt;
  color: var(--ink-muted);
  font-style: italic;
}

.band-low { color: var(--green); }
.band-high { color: var(--red); }
.band-high-ready { color: var(--green); }
.band-low-ready { color: var(--amber); }
.band-moderate { color: var(--amber); }

.hero-quadrant-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 5pt;
  font-weight: 600;
}
.hero-quadrant-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 12pt;
  color: var(--gold-bright);
  line-height: 1.35;
}

/* Analytical read — the centerpiece */
.analytical-read {
  margin: 22pt 0 22pt;
  padding: 22pt 26pt;
  background: linear-gradient(135deg, rgba(45, 212, 191, 0.06) 0%, rgba(201, 169, 97, 0.08) 100%);
  border: 1px solid var(--gold-dim);
  border-radius: 4pt;
  position: relative;
  page-break-inside: avoid;
}
.analytical-read::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--gold-bright), var(--teal-bright));
}
.analytical-read-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 12pt;
  margin-bottom: 14pt;
  padding-bottom: 10pt;
  border-bottom: 0.5pt solid var(--rule-gold);
}
.analytical-read-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5pt;
  letter-spacing: 0.28em;
  color: var(--gold-bright);
  text-transform: uppercase;
  font-weight: 700;
}
.analytical-read-peers {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  color: var(--ink-muted);
  letter-spacing: 0.1em;
}
.analytical-read-peers strong {
  color: var(--teal-bright);
  font-weight: 600;
}
.analytical-read-body {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14pt;
  font-style: italic;
  line-height: 1.55;
  color: #fff;
  letter-spacing: 0.005em;
  margin: 0;
}

/* Posture callout */
.posture-hero {
  padding: 14pt 20pt;
  background: rgba(201, 169, 97, 0.08);
  border-left: 3pt solid var(--gold-bright);
  border-radius: 2pt;
  margin-bottom: 16pt;
  page-break-inside: avoid;
}
.posture-hero-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-bright);
  font-weight: 700;
  margin-bottom: 5pt;
}
.posture-hero-thesis {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15pt;
  font-style: italic;
  color: #fff;
  line-height: 1.4;
  margin: 0;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22pt;
  margin-bottom: 14pt;
}
.two-col h4 { margin-top: 0; }
.two-col .up-label { color: var(--green); }
.two-col .down-label { color: var(--amber); }
.two-col p {
  font-size: 10pt;
  line-height: 1.55;
  color: var(--ink-soft);
  margin: 0;
}

.summary-box {
  padding: 14pt 18pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border-left: 2px solid var(--teal-dim);
}
.summary-box-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--teal-bright);
  font-weight: 600;
  margin-bottom: 6pt;
}
.summary-box-text {
  font-size: 10pt;
  line-height: 1.6;
  color: var(--ink-soft);
  margin: 0;
}

/* ============================================================
   PAGE 2 — QUADRANT
   ============================================================ */

.quadrant-grid {
  display: grid;
  grid-template-columns: 40pt 1fr 1fr;
  grid-template-rows: 18pt 1fr 1fr;
  gap: 8pt;
  margin: 0 auto 18pt;
  max-width: 5.6in;
}
.quadrant-axis-top {
  grid-column: 2 / 4;
  grid-row: 1;
  display: flex;
  justify-content: space-around;
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.25em;
  color: var(--ink-muted);
  text-transform: uppercase;
  font-weight: 600;
}
.quadrant-axis-left {
  grid-column: 1;
  grid-row: 2 / 4;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
}
.quadrant-axis-left-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.25em;
  color: var(--ink-muted);
  text-transform: uppercase;
  font-weight: 600;
  transform: rotate(-90deg);
  white-space: nowrap;
}
.q-cell {
  padding: 16pt 14pt;
  border: 0.5pt solid var(--rule);
  border-radius: 3pt;
  background: rgba(255,255,255,0.02);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 1.2in;
  position: relative;
}
.q-cell.q1 { border-left: 3pt solid var(--green); }
.q-cell.q2 { border-left: 3pt solid var(--teal-bright); }
.q-cell.q3 { border-left: 3pt solid var(--amber); }
.q-cell.q4 { border-left: 3pt solid var(--red); }
.q-cell.active {
  background: linear-gradient(135deg, rgba(201, 169, 97, 0.12) 0%, rgba(45, 212, 191, 0.06) 100%);
  box-shadow: 0 0 0 2pt var(--gold-bright);
}
.q-cell-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20pt;
  font-weight: 600;
  margin-bottom: 4pt;
  letter-spacing: 0.01em;
}
.q-cell.q1 .q-cell-name { color: var(--green); }
.q-cell.q2 .q-cell-name { color: var(--teal-bright); }
.q-cell.q3 .q-cell-name { color: var(--amber); }
.q-cell.q4 .q-cell-name { color: var(--red); }
.q-cell-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 8pt;
}
.q-cell-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10pt;
  font-style: italic;
  color: var(--ink-muted);
  line-height: 1.35;
}
.q-cell.active .q-cell-tagline { color: var(--ink-soft); }
.q-cell-marker {
  display: none;
  margin-top: 8pt;
  padding: 4pt 10pt;
  background: var(--navy);
  border: 1px solid var(--gold-bright);
  color: var(--gold-bright);
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
  border-radius: 2pt;
}
.q-cell.active .q-cell-marker { display: inline-block; }

.quadrant-caption {
  font-size: 9pt;
  color: var(--ink-muted);
  font-style: italic;
  text-align: center;
  margin: 18pt auto 0;
  max-width: 5.6in;
  line-height: 1.6;
}

.why-quadrant {
  margin-top: 26pt;
  padding: 18pt 22pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border-left: 2px solid var(--gold-dim);
}
.why-quadrant h3 { margin-top: 0; color: var(--gold-bright); }
.why-quadrant p {
  font-size: 10.5pt;
  line-height: 1.65;
  color: var(--ink-soft);
  margin: 0;
}

.close-call {
  margin-top: 18pt;
  padding: 14pt 18pt;
  background: rgba(240, 183, 61, 0.1);
  border-left: 3pt solid var(--amber);
  border-radius: 3pt;
  page-break-inside: avoid;
}
.close-call-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--amber);
  font-weight: 700;
  margin-bottom: 6pt;
}
.close-call-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12pt;
  font-style: italic;
  color: #fff;
  line-height: 1.5;
}

/* ============================================================

   ============================================================ */

.soa-reads {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16pt;
  margin-bottom: 20pt;
}
.soa-read {
  padding: 14pt 18pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border-top: 2pt solid var(--teal-bright);
}

  font-weight: 700;
  margin-bottom: 6pt;
}
.soa-read.speed .soa-read-label { color: var(--gold-bright); }
.soa-read-text {
  font-size: 10pt;
  color: var(--ink-soft);
  line-height: 1.55;
}

.milestone {
  display: grid;
  grid-template-columns: 48pt 1fr auto;
  gap: 16pt;
  padding: 12pt 0;
  border-bottom: 0.5pt solid var(--rule-soft);
  align-items: start;
  page-break-inside: avoid;
}
.milestone:last-child { border-bottom: none; }
.milestone-marker {
  text-align: center;
}
.milestone-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28pt;
  line-height: 1;
  color: var(--gold-bright);
  font-weight: 500;
}
.milestone-month {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  color: var(--ink-faint);
  margin-top: 3pt;
  letter-spacing: 0.15em;
}
.milestone-body { font-size: 10pt; line-height: 1.5; }
.milestone-text { color: var(--ink); margin-bottom: 8pt; font-size: 10.5pt; }
.milestone-chips {
  display: flex;
  gap: 6pt;
  flex-wrap: wrap;
}
.chip {
  padding: 3pt 8pt;
  border-radius: 2pt;
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
  background: rgba(255,255,255,0.05);
  color: var(--ink-muted);
  border: 0.5pt solid var(--rule);
}
.chip.feas-good { color: var(--green); border-color: var(--green); }
.chip.feas-moderate { color: var(--amber); border-color: var(--amber); }
.chip.feas-bad { color: var(--red); border-color: var(--red); }
.chip.urg-good { color: var(--green); border-color: var(--green); }
.chip.urg-moderate { color: var(--amber); border-color: var(--amber); }
.chip.urg-bad { color: var(--red); border-color: var(--red); }
.chip.factor {
  color: var(--teal-bright);
  border-color: var(--teal-dim);
  background: rgba(13, 148, 136, 0.08);
}

.blocker {
  margin-top: 14pt;
  padding: 12pt 16pt;
  background: rgba(239, 68, 68, 0.1);
  border-left: 3pt solid var(--red);
  border-radius: 3pt;
}
.blocker-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--red);
  font-weight: 700;
  margin-bottom: 5pt;
}
.blocker-text { font-size: 10pt; color: var(--ink-soft); line-height: 1.55; }

.trajectory {
  display: grid;
  grid-template-columns: 1fr 40pt 1fr;
  gap: 16pt;
  align-items: stretch;
  margin: 16pt 0;
}
.trajectory-node {
  padding: 16pt 18pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border: 0.5pt solid var(--rule);
}
.trajectory-node.t1 {
  background: rgba(201, 169, 97, 0.08);
  border-color: var(--gold-dim);
}
.trajectory-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 8pt;
  font-weight: 600;
}
.trajectory-node.t1 .trajectory-label { color: var(--gold-bright); }
.trajectory-posture {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20pt;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4pt;
  line-height: 1;
}
.trajectory-scores {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  color: var(--ink-muted);
  margin-bottom: 8pt;
  letter-spacing: 0.05em;
}
.trajectory-note {
  font-size: 9pt;
  font-style: italic;
  color: var(--ink-soft);
  line-height: 1.5;
}
.trajectory-arrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36pt;
  color: var(--gold-bright);
  text-align: center;
  line-height: 1;
  align-self: center;
}

.trajectory-narrative {
  margin-top: 6pt;
  padding: 12pt 16pt;
  background: rgba(255,255,255,0.02);
  border-left: 2px solid var(--rule);
  border-radius: 2pt;
  font-size: 10pt;
  line-height: 1.6;
  color: var(--ink-soft);
  font-style: italic;
}

/* ============================================================
   PAGES 4-5 — FACTOR SCORECARDS
   ============================================================ */

.factor-section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--teal-bright);
  font-weight: 700;
  padding-bottom: 6pt;
  border-bottom: 0.75pt solid var(--teal-dim);
  margin-bottom: 12pt;
}
.factor-section-label.readiness {
  color: var(--gold-bright);
  border-bottom-color: var(--gold-dim);
}
.factor-section-label strong {
  color: #fff;
  font-weight: 700;
}

.peer-callout {
  padding: 14pt 18pt;
  background: rgba(45, 212, 191, 0.06);
  border-left: 3pt solid var(--teal-bright);
  border-radius: 3pt;
  margin-bottom: 18pt;
  page-break-inside: avoid;
}
.peer-callout.readiness {
  border-left-color: var(--gold-bright);
  background: rgba(201, 169, 97, 0.06);
}
.peer-callout-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--teal-bright);

.peer-callout-text {

  color: var(--ink-soft);
  font-style: italic;

  height: 1px;
  background: var(--rule);
  margin: 10pt 0;
}

.factor {
  display: grid;
  grid-template-columns: 36pt 1fr 72pt;
  gap: 14pt;
  padding: 10pt 0;
  border-bottom: 0.5pt solid var(--rule-soft);
  page-break-inside: avoid;
}
.factor:last-child { border-bottom: none; }
.factor-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9pt;
  font-weight: 700;
  color: var(--gold-bright);
  padding-top: 3pt;
  letter-spacing: 0.05em;
}
.factor-name {
  font-size: 10pt;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4pt;
}
.factor-rationale {
  font-size: 9pt;
  color: var(--ink-soft);
  line-height: 1.55;
}
.factor-num-block {
  text-align: right;
  padding-top: 2pt;
}
.factor-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24pt;
  font-weight: 500;
  line-height: 1;
  color: #fff;
}
.factor-num.good { color: var(--green); }
.factor-num.moderate { color: var(--amber); }
.factor-num.bad { color: var(--red); }
.factor-weight {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  color: var(--ink-faint);
  margin-top: 3pt;
  letter-spacing: 0.08em;
}
.factor-contribution {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5pt;
  color: var(--gold-bright);
  font-weight: 600;
  margin-top: 2pt;
  letter-spacing: 0.05em;
}

/* ============================================================
   PAGE 6 — GAP, TRIGGERS, EVIDENCE
   ============================================================ */

.priority-list { list-style: none; padding: 0; margin: 0; counter-reset: priority; }
.priority-list li {
  padding: 12pt 16pt 12pt 44pt;
  margin-bottom: 10pt;
  background: rgba(255,255,255,0.03);
  border-left: 3pt solid var(--teal-bright);
  border-radius: 3pt;
  position: relative;
  font-size: 10pt;
  line-height: 1.6;
  color: var(--ink-soft);
  counter-increment: priority;
  page-break-inside: avoid;
}
.priority-list li::before {
  content: counter(priority);
  position: absolute;
  left: 14pt;
  top: 10pt;
  font-family: 'Cormorant Garamond', serif;
  font-size: 20pt;
  line-height: 1;
  color: var(--gold-bright);
  font-weight: 500;
}

.trigger-list { list-style: none; padding: 0; margin: 0; }
.trigger-list li {
  padding: 10pt 16pt 10pt 34pt;
  margin-bottom: 8pt;
  background: rgba(240, 183, 61, 0.08);
  border-left: 3pt solid var(--amber);
  border-radius: 3pt;
  position: relative;
  font-size: 9.5pt;
  line-height: 1.5;
  color: var(--ink-soft);
  page-break-inside: avoid;
}
.trigger-list li::before {
  content: "⚠";
  position: absolute;
  left: 12pt;
  top: 10pt;
  color: var(--amber);
  font-weight: 700;
  font-size: 11pt;
}

.evidence-list { padding-left: 18pt; margin: 0; }
.evidence-list li {
  margin-bottom: 7pt;
  font-size: 9pt;
  line-height: 1.55;
  color: var(--ink-soft);
}
.evidence-list li::marker { color: var(--gold); }

/* ============================================================
   PAGE 7 — METHODOLOGY
   ============================================================ */

.method-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16pt;
  margin-bottom: 22pt;
}
.method-block {
  padding: 14pt 18pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border-top: 2pt solid var(--teal-bright);
}
.method-block h4 { margin-top: 0; color: var(--teal-bright); }
.method-block p {
  font-size: 9.5pt;
  line-height: 1.6;
  color: var(--ink-soft);
  margin: 0;
}

.run-details-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12pt;
  margin-bottom: 20pt;
}
.run-detail {
  padding: 12pt 14pt;
  background: rgba(255,255,255,0.03);
  border-radius: 3pt;
  border-left: 2pt solid var(--teal-dim);
}
.run-detail-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7pt;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 5pt;
  font-weight: 600;
}
.run-detail-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10pt;
  color: #fff;
  font-weight: 500;
}

.confidence-box {
  padding: 16pt 20pt;
  background: rgba(201, 169, 97, 0.08);
  border-left: 3pt solid var(--gold-bright);
  border-radius: 3pt;
  margin-bottom: 20pt;
}
.confidence-box-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-bright);
  font-weight: 700;
  margin-bottom: 6pt;
}
.confidence-box-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20pt;
  font-weight: 600;
  color: #fff;
  margin-bottom: 8pt;
  line-height: 1;
}
.confidence-box-rationale {
  font-size: 10pt;
  color: var(--ink-soft);
  line-height: 1.6;
  font-style: italic;
}

.final-note {
  margin-top: 28pt;
  padding-top: 14pt;
  border-top: 0.5pt solid var(--rule);
  font-size: 8.5pt;
  color: var(--ink-faint);
  line-height: 1.6;
  font-style: italic;
}

.toolbar {

.tb-btn-secondary {

}
.empty-state h2 {

}
.empty-state p { color: var(--ink-soft); line-height: 1.6; }
.empty-state a {

  border-radius: 2px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;

}

/* ============================================================
   PRINT — preserve dark background, force colors
   ============================================================ */

@page {
  size: letter;
  margin: 0;
  background: var(--navy);
}

@media print {
  html, body { background: var(--navy); }
  .toolbar, .empty-state { display: none !important; }
  .page {
    margin: 0;
    box-shadow: none;
    width: 8.5in;
    min-height: 11in;
    page-break-after: always;
    break-after: page;
  }
  .page:last-child {
    page-break-after: auto;
    break-after: auto;
  }
  .page.cover {
    min-height: 11in;
  }
  /* Force dark background + all colors to print */
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }

  /* Avoid orphan breaks in critical blocks */
  .analytical-read, .posture-hero, .close-call, .blocker,
  .milestone, .factor, .priority-list li, .trigger-list li,
  .peer-callout, .confidence-box, .hero-scores, .trajectory {
    page-break-inside: avoid;
    break-inside: avoid;
  }
  h1, h2, h3 {
    page-break-after: avoid;
    break-after: avoid;
  }
}

@media (max-width: 900px) {
  .page { width: 100%; padding: 24px; min-height: auto; }
  .hero-scores { grid-template-columns: 1fr; gap: 12pt; }
  .two-col { grid-template-columns: 1fr; gap: 12pt; }
  .soa-reads { grid-template-columns: 1fr; }
  .trajectory { grid-template-columns: 1fr; }
  .trajectory-arrow { transform: rotate(90deg); font-size: 28pt; }
  .run-details-grid { grid-template-columns: 1fr 1fr; }
  .method-grid { grid-template-columns: 1fr; }
  .cover-title { font-size: 48pt; }
}

// ============================================================
// SCORING / THRESHOLDS
// ============================================================
function riskThreatBand(score) {
  if (score <= 25) return { label: 'LOW THREAT', sub: 'Well inside boundary', cls: 'band-low' };
  if (score <= 50) return { label: 'LOW THREAT', sub: 'Near boundary — monitor', cls: 'band-low' };
  if (score <= 70) return { label: 'HIGH THREAT', sub: 'Actionable — accelerate', cls: 'band-moderate' };
  return { label: 'HIGH THREAT', sub: 'Critical — urgent', cls: 'band-high' };
}
function readinessBand(score) {
  if (score >= 75) return { label: 'HIGH READINESS', sub: 'Best-in-class foundation', cls: 'band-high-ready' };
  if (score > 50)  return { label: 'HIGH READINESS', sub: 'Solid foundation', cls: 'band-high-ready' };
  if (score >= 40) return { label: 'LOW READINESS', sub: 'Developing — BUILD MODE territory', cls: 'band-low-ready' };
  return { label: 'LOW READINESS', sub: 'Early-stage foundation', cls: 'band-high' };
}
function determineQuadrant(riskScore, readinessScore) {
  const lowThreat = riskScore <= 50;
  const highReady = readinessScore > 50;
  if (lowThreat && highReady) return { id: 'q1', name: 'EXECUTE', sub: 'Low Threat · High Readiness', tagline: 'The thesis works. Run the playbook.' };
  if (!lowThreat && highReady) return { id: 'q3', name: 'RACE MODE', sub: 'High Threat · High Readiness', tagline: 'The thesis works, but the clock is ticking.' };
  if (lowThreat && !highReady) return { id: 'q2', name: 'BUILD MODE', sub: 'Low Threat · Low Readiness', tagline: 'The thesis requires patience.' };
  return { id: 'q4', name: 'DANGER ZONE', sub: 'High Threat · Low Readiness', tagline: 'The thesis doesn\'t work inside the hold.' };
}
function factorScoreClass(score, isRisk) {
  if (isRisk) { if (score <= 30) return 'good'; if (score <= 60) return 'moderate'; return 'bad'; }
  if (score >= 70) return 'good'; if (score >= 45) return 'moderate'; return 'bad';
}
function calculateWeightedScore(scores, factors) {
  let total = 0;
  for (const f of factors) if (scores[f.id]) total += (scores[f.id].score * f.weight) / 100;
  return total;
}
function feasClass(v) {
  if (v === 'ACHIEVABLE') return 'feas-good';
  if (v === 'AT RISK') return 'feas-moderate';
  return 'feas-bad';
}
function urgClass(v) {
  if (v === 'LOW') return 'urg-good';
  if (v === 'MODERATE') return 'urg-moderate';
  return 'urg-bad';
}
function esc(text) {
  if (text == null) return '';
  return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function loadPayload() {
  const params = new URLSearchParams(window.location.search);
  const key = params.get('id') || 'perch_last_report';
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { console.error(e); return null; }
}

function renderEmptyState() {
  document.getElementById('root').innerHTML = `
    <div class="empty-state">
      <h2>No report data found</h2>
      <p>This IC Report page reads the most recent PERCH analysis from your browser's local storage. Please run PERCH first, then click <strong>Open IC Report</strong> from the results page.</p>
      <a href="/">← Return to PERCH</a>
    </div>
  `;
  document.querySelector('.toolbar').style.display = 'none';
}

function fmtDate(d) {
  return d.toLocaleString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}
function fmtDateShort(d) {
  return d.toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

  const { company, result, meta } = payload;
  const generatedAt = payload.generated_at ? new Date(payload.generated_at) : new Date();

  const riskScore = calculateWeightedScore(result.risk_scores, RISK_FACTORS);
  const readinessScore = calculateWeightedScore(result.readiness_scores, READINESS_FACTORS);

        </div>
        <div class="hero-score readiness">

      ${cc ? `

  // ============= PAGE 2 — POSTURE + COMPANY SUMMARY =============

          <div class="q-cell-marker">◆ ${esc(company.name)}</div>

      </div>

      <div class="why-quadrant">
        <h3>Why ${esc(quadrant.name)}</h3>
        <p>
          ${quadrant.id === 'q1' ? `The moat is real AND the foundations are ready. The job is not to figure out whether to win — it is to run the SOAR playbook with quality and discipline, compound the advantage, and set up exit multiple expansion. <strong>Posture:</strong> Buy with conviction; extend the lead; quality over speed. <strong>Cadence:</strong> Deliberate — quarterly board review, monthly SOAR score refresh.` : ''}

          ${quadrant.id === 'q2' ? `The moat is real — time is on the company's side. But the foundations for AI (data, architecture, team) aren't there yet. This is a legitimate, deliberate state — many great companies START in BUILD MODE and migrate to EXECUTE during the hold. <strong>Posture:</strong> Buy with discipline; fix foundations before shipping AI features. <strong>Cadence:</strong> Foundation sprints; quarterly readiness re-scoring.` : ''}
          ${quadrant.id === 'q4' ? `Competitive pressure is high AND the company can't respond fast enough. By the time foundations are ready, the window will have closed. AQL, by construction, does not invest here. <strong>Posture:</strong> Do not buy. If holding, re-underwrite or exit. <strong>Cadence:</strong> Immediate thesis review.` : ''}
        </p>
      </div>

      ${result.close_call_flag && result.close_call_flag.is_close_call ? `
        <div class="close-call">
          <div class="close-call-label">⚠ Close Call — ${esc(result.close_call_flag.axis)} axis</div>
          <div class="close-call-text">${esc(result.close_call_flag.explanation)}</div>
        </div>
      ` : ''}

      ${pageFooter(3)}
    </div>
  `;

  // ============= PAGE 4 — SOA PATH =============
  const soa = result.soa_milestone_map || {};
  const milestones = Array.isArray(soa.milestones) ? soa.milestones : [];
  const t12 = result.twelve_month_view || {};
  const soaPathPage = `
    <div class="page content">

      ${sectionMarker(4, 'Convergence Path to SOA')}
      <h1>The Path</h1>
      <p class="lede">All quadrants converge on SOA. Risk sets urgency, Readiness sets feasible speed. These are the milestones this company must hit to reach outcome-tier pricing and exit multiple expansion.</p>

      <div class="soa-reads">
        <div class="soa-read">

          <div class="milestone-marker">
            <div class="milestone-num">${m.number || ''}</div>

          </div>
          <div class="milestone-body">
            <div class="milestone-text">${esc(m.milestone || '')}</div>
            <div class="milestone-chips">
              <span class="chip ${feasClass(m.feasibility_given_readiness)}">Feasibility: ${esc(m.feasibility_given_readiness || '')}</span>
              <span class="chip ${urgClass(m.urgency_pressure)}">Urgency: ${esc(m.urgency_pressure || '')}</span>
              ${(m.linked_factors || []).map(f => `<span class="chip factor">${esc(f)}</span>`).join('')}

          </div>
        </div>

      </div>

      ${soa.biggest_blocker ? `
        <div class="blocker">
          <div class="blocker-label">⚠ Biggest Blocker on the SOA Path</div>

      ` : ''}

        <div class="trajectory-node">

        </div>
        <div class="trajectory-arrow">→</div>
        <div class="trajectory-node t1">

      </div>
      ${t12.trajectory_narrative ? `<div class="trajectory-narrative">${esc(t12.trajectory_narrative)}</div>` : ''}

      ${pageFooter(4)}

  `;

  // ============= PAGE 5 — RISK SCORECARD =============
  const riskFactorPage = `

      ` : ''}

      <div class="factor-section-label">Risk Factors · 7 Factors · Weighted: <strong>${riskScore.toFixed(1)}</strong></div>
      ${RISK_FACTORS.map(f => {
        const s = result.risk_scores[f.id];
        if (!s) return '';
        const cls = factorScoreClass(s.score, true);
        const contribution = ((s.score * f.weight) / 100).toFixed(1);
        return `
          <div class="factor">
            <div class="factor-id">${f.id}</div>
            <div>
              <div class="factor-name">${esc(f.name)}</div>
              <div class="factor-rationale">${esc(s.rationale)}</div>
            </div>
            <div class="factor-num-block">
              <div class="factor-num ${cls}">${s.score}</div>
              <div class="factor-weight">Weight ${f.weight}%</div>
              <div class="factor-contribution">${contribution} pts</div>
            </div>
          </div>
        `;
      }).join('')}

      ${pageFooter(5)}
    </div>
  `;

  // ============= PAGE 6 — READINESS SCORECARD =============
  const readinessFactorPage = `
    <div class="page content">
      ${pageHeader(company.name, 'Readiness Factor Scorecard', 6)}
      ${sectionMarker(6, 'Readiness · The Governor')}

        ` : ''}
        ${cc.binding_constraint_narrative ? `
        <div class="peer-callout-divider"></div>
        <div class="peer-callout-label peer-callout-label-binding">Binding Constraint${cc.binding_constraint_factor ? ` · ${esc(cc.binding_constraint_factor)}` : ''}</div>

        ` : ''}
      </div>
      ` : ''}

      <div class="factor-section-label readiness">Readiness Factors · 9 Factors · Weighted: <strong>${readinessScore.toFixed(1)}</strong></div>
      ${READINESS_FACTORS.map(f => {
        const s = result.readiness_scores[f.id];
        if (!s) return '';
        const cls = factorScoreClass(s.score, false);
        const contribution = ((s.score * f.weight) / 100).toFixed(1);
        return `
          <div class="factor">
            <div class="factor-id">${f.id}</div>
            <div>
              <div class="factor-name">${esc(f.name)}</div>
              <div class="factor-rationale">${esc(s.rationale)}</div>
            </div>
            <div class="factor-num-block">
              <div class="factor-num ${cls}">${s.score}</div>
              <div class="factor-weight">Weight ${f.weight}%</div>
              <div class="factor-contribution">${contribution} pts</div>

      }).join('')}

  `;

      <h3>Threshold Triggers</h3>

      </div>

      <h3>Run Details</h3>
      <div class="run-details-grid">
        <div class="run-detail">
          <div class="run-detail-label">Searches Performed</div>
          <div class="run-detail-value">${meta && meta.searches_performed != null ? meta.searches_performed : '—'}</div>

        <div class="run-detail">
          <div class="run-detail-label">Pages Fetched</div>
          <div class="run-detail-value">${meta && meta.pages_fetched != null ? meta.pages_fetched : '—'}</div>
        </div>
        <div class="run-detail">
          <div class="run-detail-label">Extended Thinking</div>
          <div class="run-detail-value">${meta && meta.extended_thinking_used ? 'Yes' : 'No'}</div>

        <div class="run-detail">
          <div class="run-detail-label">Model</div>
          <div class="run-detail-value" style="font-size: 8.5pt;">${esc(meta && meta.model || '—')}</div>

        <div class="run-detail">

          <div class="run-detail-value">${meta && meta.usage && meta.usage.input_tokens ? meta.usage.input_tokens.toLocaleString() : '—'}</div>
        </div>
        <div class="run-detail">
          <div class="run-detail-label">Output Tokens</div>
          <div class="run-detail-value">${meta && meta.usage && meta.usage.output_tokens ? meta.usage.output_tokens.toLocaleString() : '—'}</div>
        </div>
      </div>

      <div class="final-note">
        Generated by Eagle Vision · PERCH on ${esc(fmtDate(generatedAt))}. Point-in-time assessment based on evidence available at run time. Scores and posture may shift as new evidence emerges or as the company executes against its plan. Distribution limited to AQL Growth partners and authorized recipients.
      </div>

      ${pageFooter(7)}
    </div>
  `;

  document.getElementById('root').innerHTML =
    coverPage + execSummaryPage + posturePage + quadrantPage +
    soaPathPage + riskFactorPage + readinessFactorPage + closingPage;
}

document.addEventListener('DOMContentLoaded', () => {
  const payload = loadPayload();
  if (!payload || !payload.result || !payload.company) {
    renderEmptyState();
    return;
  }
  renderReport(payload);
});
</script>
